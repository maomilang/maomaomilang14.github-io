<script>
const QS=[
  {id:1,p:1,t:"銀行爰用「信用風險值」當作放款權限設置準則時，下列何者屬於無法反映的個別客戶風險？",o:["市場風險","違約風險","暴露風險","回收風險"],a:0},
  {id:2,p:1,t:"關於風險管理的組織運作方式，下列敘述何者錯誤？",o:["強調風險產生單位與監督單位宜相互隸屬","風險管理的決策過程，涵蓋「從上而下」與「由下往上」兩種","不論哪種風險均應詳細釐清前台、中台及後台的職掌，集中控制、分權營運","業務管理部門須定期評估所有營業單位的營業概況，包括不同業務的收支、利潤與風險承擔"],a:0},
  {id:3,p:1,t:"有關資產負債管理委員會之權責，下列敘述何者錯誤？",o:["審核全行作業風險的緊急應變計畫","審核流動性管理指標的門檻標準","審核利率風險之避險策略","審核金融同業的拆款額度"],a:0},
  {id:4,p:1,t:"關於成本中心，下列敘述何者錯誤？",o:["成本中心的主管僅能控制成本或費用","成本中心以追求產品或服務成本最低為其努力目標","成本中心主管無權參與選擇各項投入資源的標準及來源","成本中心適用的單位，「無權決定」產量或服務多寡，以及產量或服務售價"],a:2},
  {id:5,p:1,t:"轉投資類型的投資中心，宜使用下列何者當作績效衡量指標？",o:["銷售額","內外部損益","資本或股權投資的報酬率","可控制成本"],a:2},
  {id:6,p:1,t:"經濟移轉價格通常考量下列哪些因子？ A.作業成本 B.與資金來源有關的借款成本 C.與流動性風險有關的流動性貼水 D.與信用風險有關的呆帳準備",o:["僅 B","僅 A、B","僅 B、C、D","A、B、C、D"],a:3},
  {id:7,p:1,t:"銀行基於規避匯率風險，最好保持每種幣別的資產與負債相同。所謂資產與負債相同，不包括下列何者？",o:["金額大小力求相近","到期日結構力求相近","匯率與利率走勢力求相近","平均期限(Duration)力求相近"],a:2},
  {id:8,p:1,t:"假設小王購買一張期別 2 年、AA 等級、平價發行的本國債券，該債券的票面價值$100,000 且票面利率為每年 4%，經過一年以後，該債券被信用評等機構調降評等，導致該債券的市場殖利率從原本的 4%上升至 5%，請問該債券遭調降評等，導致市場價值變動多少？",o:["減少$962","減少$952","增加$952","增加$962"],a:1},
  {id:9,p:1,t:"衡量公司之短期償債能力，下列何者正確？",o:["速動比率＝速動資產／速動負債","速動比率＝（流動資產－預付費用）／速動負債","速動比率＝速動資產／流動負債","速動比率＝流動資產／速動負債"],a:2},
  {id:10,p:1,t:"關於應收帳款代收融資業務，下列敘述何者錯誤？",o:["係根據企業尚未收妥的應收帳款，提供週轉資金並賺取利息收入","有追索權的應收帳款管理商，得向商品或勞務供應者追討墊付之帳款","無追索權的授信對象為商品或勞務的提供者","銀行可要求應收帳款讓與者額外負擔保險費用，以降低信用風險"],a:2},
  {id:11,p:1,t:"銀行辦理的短期債務保證，下列哪種項目不屬於此類業務？",o:["記帳稅款","預收定金之返還","預付款之返還","押標金"],a:0},
  {id:12,p:1,t:"發卡銀行辦理的信用卡業務，主要有三種收入來源，不包含下列何者？",o:["利息收入","國外刷卡之匯差收入","手續費收入","向特約商店收取折扣費用"],a:1},
  {id:13,p:1,t:"某甲的月收入平均 6 萬元，目前的無擔保債務僅有向乙銀行申辦信用卡，刷卡使用尚有的循環信用餘額 80 萬元。某甲打算再向丙銀行申辦信用貸款，依主管機關規定，請問某甲最高可貸多少金額？",o:["32 萬元","42 萬元","52 萬元","62 萬元"],a:2},
  {id:14,p:1,t:"依據標準普爾信評公司之評等架構，下列哪些因子會影響營運風險之規模？ A.產業發展前景 B.產品分散程度 C.市場競爭地位 D.管理階層的領導能力",o:["僅 A","僅 B、C","僅 A、B、C","A、B、C、D"],a:3},
  {id:15,p:1,t:"下列哪項不屬於企業的非公開舉債(Private Debt)？",o:["銀行借款","發行公司債","保單借款","證券金融公司提供的融資"],a:1},
  {id:16,p:1,t:"銀行依照授信法規，對「所有利害關係人」的擔保授信總餘額，不得超過銀行淨值多少倍數？",o:["1 倍","1.5 倍","2 倍","2.5 倍"],a:1},
  {id:17,p:1,t:"授信業務的系統性信用風險，不包括哪項影響因素？",o:["產業環境","總體環境","政治及社會因素","個別借款客戶"],a:3},
  {id:18,p:1,t:"授信資產的配置，重視「報酬率與風險」構成的效率原則，下列哪項內容符合該原則？",o:["追求短期平均成本最低","追求長期生產成本最低","承擔高風險時，要求對應產生高報酬","低風險時，仍要追求高報酬"],a:2},
  {id:19,p:1,t:"授信客戶的國家別歸屬，實務上採法定歸屬。假設本國 A 銀行之香港分行對位於新加坡之美商Ｂ公司辦理授信，且由 B 公司之美國母公司 C 提供保證。請問該授信客戶的國家別歸屬應為何國？",o:["臺灣","中國","新加坡","美國"],a:3},
  {id:20,p:1,t:"國家主權評等的信用等級極可能在三個月內調升時，國際信用評等機構會將該國列於下列何者？",o:["正向觀察名單","正向展望","穩定展望","正向調升名單"],a:0},
  {id:21,p:1,t:"依據 S&P 的國家主權評等，非投資級是指下列何者？",o:["A 等級以下","BBB 等級以下","BB 等級以下","B 等級以下"],a:2},
  {id:22,p:1,t:"A 銀行在 110 年 12 月底之信用風險加權風險性資產為新臺幣（以下同）1,000 億元，市場風險和作業風險應計提資本各為 5 億元，請問三種風險合計的加權風險性資產為下列何者？",o:["1,000 億元","1,005 億元","1,010 億元","1,125 億元"],a:3},
  {id:23,p:1,t:"有關槓桿比率，下列敘述何者錯誤？",o:["目的係用來補充以風險衡量為基礎之最低資本要求","槓桿比率之分子為第一類資本淨額","槓桿比率之分母為暴險總額","最低要求的槓桿比率為 6%"],a:3},
  {id:24,p:1,t:"銀行為提高普通股權益比率，可採用下列哪些措施？ A.現金增資 B.盈餘轉增資 C.不動產重估 D.發行可轉換次順位債券",o:["僅AB","僅CD","僅BCD","ABCD"],a:0},
  {id:25,p:1,t:"保險業的資本適足率多少時，會被視為資本顯著不足？",o:["最近二期淨值比率均未達百分之三且其中至少一期在百分之二以上","200%以上，未達 250%","150%以上，未達 200%","50%以上，未達 150%；最近二期淨值比率均未達 2%且在 0 以上"],a:3},
  {id:26,p:1,t:"有關金控公司之敘述，下列何者正確？ A.金控公司對信託子公司持股至少 50%，才具有控制權 B.金控公司對所有非金融相關事業總投資，不得超過金控公司淨值 15% C.金控公司對創業投資子公司的持股，不得超過被投資公司股份總數 10%",o:["僅AB","僅AC","僅BC","ABC"],a:0},
  {id:27,p:1,t:"實務上，銀行的「債權管理」會發生回收風險，該回收風險不包括下列何者？",o:["擔保品風險","第三人保證的風險","簽訂的法律契約風險","違約機率固定且已知的風險"],a:3},
  {id:28,p:1,t:"有關信用風險的衡量類型，不包含下列何者？",o:["直接放款風險","或有風險（如承兌）","交割日風險","交割後風險"],a:3},
  {id:29,p:1,t:"信用風險標準法設定的風險權數，遵循「信用等級越差，權數越高」原則，當授信對象為政府機關時，有關信用等級與適用權數，下列何者錯誤？",o:["AAA 至 AA─，0%","A+至 A─，10%","BBB+至 BBB─，50%","BB+至 B─，100%"],a:1},
  {id:30,p:1,t:"A 銀行的信用等級為 AAA─，B 銀行的信用等級為 A+，當 B 銀行買入 A 銀行發行之七年期金融債券新臺幣 1 億元時，B 銀行持有此筆金融債券，構成多少信用風險性資產？",o:["1 億元","0.5 億元","0.2 億元","0"],a:2},

  {id:53,p:2,t:"依銀行流動性覆蓋比率實施標準，有關流動性覆蓋比率，下列敘述何者錯誤？",o:["自 108 年起不得低於 100%","輸出入銀行、外國銀行在臺分行，不適用本標準","指合格高品質流動性資產總額除以未來 60 個日曆日之淨現金流出總額","銀行應按月計算並申報流動性覆蓋比率"],a:2},
  {id:54,p:2,t:"有關違約、違約風險及違約事件，下列敘述何者錯誤？",o:["違約風險係由違約事件的發生機率加以描述","交易對手未遵守契約規定之違約，屬於技術性違約","逾期放款係指屆清償期達六個月以上，仍無法繳交本金或利息者","經濟違約，係指授信客戶總資產市值低於總負債市值"],a:2},
  {id:55,p:2,t:"有關信用風險的類型與暴露風險，下列敘述何者錯誤？",o:["土建融案件之擔保品風險使用擔保成數衡量，亦即實際貸款額佔可貸值的比率(Loan-to-Value)，擔保成數越高，銀行債權保障越低","授信客戶未依還款計畫逕自提前還款，構成「提前還款風險」(Prepayment Risk)，性質類似「再投資風險」","衍生性業務之「當期暴險額」，反映目前的暴露風險，有別於反映未來可能存在風險之「潛在暴險額」","信用額度內未被動用之授信資產，稱為「放款承諾」，此項承諾使銀行承擔或有之「再投資風險」"],a:3},

  {id:57,p:2,t:"不論單一金融商品、組合部位或全行資產負債觀點，衡量「市場風險」最常見的市場因素不包括下列何者？",o:["利率","匯率","生產要素成本","非生產要素的固定成本"],a:3},
  {id:58,p:2,t:"有關市場風險標準法與內部模型法，下列敘述何者錯誤？",o:["標準法在正常情形，可使市場風險之門檻設計及風險配置更加精緻","銀行可使用內部模型法，計算各部位之市場風險值與資本計提額","常理上，內部模型法在風險衡量精細程度優於標準法，計提的資本需求額也較標準法少","銀行可使用標準法計算各部位之市場風險限額與資本計提額"],a:0},

  {id:60,p:2,t:"根據 2022 年起的法規，銀行的資本等級被劃分為「資本顯著不足」，表示此銀行：",o:["資本適足比率達 2%以上，但未達 8.5%","資本適足比率未達 2%","資本適足比率達 9%","資本適足比率達 10%"],a:0}

let sqList=[],ua={},so={},ansCount=0,sub=false;
function shuf(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function startQuiz(){
  document.getElementById('ss').style.display='none';
  document.getElementById('qs').style.display='block';
  document.getElementById('rs').style.display='none';
  sqList=shuf([...Array(60).keys()]).map(i=>QS[i]);
  so={};ua={};ansCount=0;sub=false;
  sqList.forEach((_,qi)=>{so[qi]=shuf([0,1,2,3]);});
  buildNav();buildQs();
  window.scrollTo(0,0);
}

function buildNav(){
  const c=document.getElementById('ndots');c.innerHTML='';
  sqList.forEach((_,qi)=>{
    const d=document.createElement('div');
    d.className='nd';d.id='nd'+qi;d.textContent=qi+1;
    d.onclick=()=>document.getElementById('q'+qi).scrollIntoView({behavior:'smooth',block:'center'});
    c.appendChild(d);
  });
}

function buildQs(){
  const c=document.getElementById('qcon');c.innerHTML='';
  const lb=['(1)','(2)','(3)','(4)'];
  sqList.forEach((q,qi)=>{
    const sc=q.p===1?'1.5分':'2分';const pt=q.p===1?'第一部分':'第二部分';
    let oh='';
    so[qi].forEach((oi,ni)=>{
      oh+=`<div class="opt" id="o${qi}_${ni}" onclick="pick(${qi},${ni})"><div class="ol">${lb[ni]}</div><div>${q.o[oi]}</div></div>`;
    });
    const card=document.createElement('div');
    card.className='qcard';card.id='q'+qi;
    card.innerHTML=`<div class="qh"><div class="qn">第 ${qi+1} 題</div><div class="qs">${pt}｜${sc}</div><div class="qt">${q.t}</div></div><div class="opts">${oh}</div>`;
    c.appendChild(card);
  });
}

function pick(qi,ni){
  if(sub)return;
  const was=ua[qi]!==undefined;
  if(was)document.getElementById('o'+qi+'_'+ua[qi]).classList.remove('sel');
  else ansCount++;
  ua[qi]=ni;
  document.getElementById('o'+qi+'_'+ni).classList.add('sel');
  document.getElementById('nd'+qi).classList.add('cur');
  upd();
}

function upd(){
  const p=(ansCount/60*100).toFixed(0);
  document.getElementById('pb').style.width=p+'%';
  document.getElementById('pl').textContent=`已作答 ${ansCount} / 60 題`;
  document.getElementById('ba').textContent=ansCount;
}

function jumpUnanswered(){
  for(let i=0;i<60;i++){if(ua[i]===undefined){document.getElementById('q'+i).scrollIntoView({behavior:'smooth',block:'center'});return;}}
  alert('所有題目已作答！可以交卷了。');
}

function calcScore(){
  let tot=0,cor=0,wrg=0,blk=0;
  sqList.forEach((q,qi)=>{
    const pts=q.p===1?1.5:2;
    if(ua[qi]===undefined)blk++;
    else if(so[qi][ua[qi]]===q.a){tot+=pts;cor++;}
    else wrg++;
  });
  return{tot,cor,wrg,blk};
}

function submitQuiz(){
  const un=60-ansCount;
  if(un>0){if(!confirm(`您還有 ${un} 題未作答，確定要交卷嗎？`))return;}
  else if(!confirm('確定要交卷嗎？'))return;
  sub=true;
  sqList.forEach((q,qi)=>{
    const cni=so[qi].indexOf(q.a);
    for(let ni=0;ni<4;ni++)document.getElementById('o'+qi+'_'+ni).classList.add('dis');
    if(ua[qi]!==undefined){
      const chn=ua[qi];
      if(so[qi][chn]===q.a){
        const el=document.getElementById('o'+qi+'_'+chn);el.classList.remove('sel');el.classList.add('cor');
        document.getElementById('nd'+qi).className='nd ok';
      } else {
        const el=document.getElementById('o'+qi+'_'+chn);el.classList.remove('sel');el.classList.add('wrg');
        document.getElementById('o'+qi+'_'+cni).classList.add('shcor');
        document.getElementById('nd'+qi).className='nd err';
      }
    } else {
      document.getElementById('o'+qi+'_'+cni).classList.add('shcor');
      document.getElementById('nd'+qi).className='nd err';
    }
  });
  const r=calcScore();
  document.getElementById('pr').textContent=`得分 ${r.tot.toFixed(1)} 分`;
  setTimeout(()=>{
    document.getElementById('qs').style.display='none';
    const rsel=document.getElementById('rs');rsel.style.display='block';
    document.getElementById('rsn').textContent=r.tot.toFixed(1);
    const passed=r.tot>=60;
    document.getElementById('rc').className='rc '+(passed?'pass':'fail');
    document.getElementById('rt').textContent=passed?'🎉 恭喜通過測驗！':'📚 繼續加油！';
    document.getElementById('rc2').textContent=r.cor;
    document.getElementById('rw').textContent=r.wrg;
    document.getElementById('rb').textContent=r.blk;
    window.scrollTo(0,0);
  },400);
}

function toggleReview(){
  const d=document.getElementById('revdiv');
  if(d.classList.contains('show')){d.classList.remove('show');return;}
  d.classList.add('show');
  const c=document.getElementById('revcon');c.innerHTML='';
  const lb=['(1)','(2)','(3)','(4)'];
  sqList.forEach((q,qi)=>{
    const cni=so[qi].indexOf(q.a);
    const chn=ua[qi];
    const pts=q.p===1?1.5:2;
    let st='⬜ 未作答',stc='#94a3b8';
    if(chn!==undefined){if(so[qi][chn]===q.a){st='✅ 正確';stc='#22c55e';}else{st='❌ 錯誤';stc='#ef4444';}}
    let oh=so[qi].map((oi,ni)=>{
      let s='color:#64748b',m='';
      if(ni===cni){s='color:#86efac;font-weight:600';m=' ✓';}
      if(ni===chn&&so[qi][chn]!==q.a){s='color:#fca5a5;text-decoration:line-through';m=' ✗';}
      return`<div style="${s};font-size:.82rem;margin:3px 0">${lb[ni]} ${q.o[oi]}${m}</div>`;
    }).join('');
    const card=document.createElement('div');
    card.style.cssText='background:#1e293b;border:1px solid #334155;border-radius:11px;padding:14px;margin-bottom:10px';
    card.innerHTML=`<div style="display:flex;gap:6px;align-items:flex-start;margin-bottom:9px;flex-wrap:wrap"><span style="background:#1d4ed8;color:#fff;padding:2px 7px;border-radius:4px;font-size:.67rem;font-weight:700">第${qi+1}題（原第${q.id}題）</span><span style="background:#0f172a;color:#67e8f9;font-size:.67rem;padding:2px 6px;border-radius:4px">${pts}分</span><span style="background:#0f172a;font-size:.68rem;padding:2px 6px;border-radius:4px;color:${stc}">${st}</span><div style="font-size:.87rem;color:#e2e8f0;flex:1;line-height:1.65;min-width:180px">${q.t}</div></div>${oh}`;
    c.appendChild(card);
  });
}

function restartQuiz(){
  document.getElementById('revdiv').classList.remove('show');
  startQuiz();
}
</script>
